version: '3.8'

services:
  # MySQL 8
  mysql:
    image: mysql:8.0
    container_name: mh_mysql
    restart: unless-stopped
    ports:
      - '8748:3306'
    environment:
      MYSQL_ROOT_PASSWORD: masterise_root_2024
      MYSQL_DATABASE: masterise_homes
      MYSQL_USER: masterise
      MYSQL_PASSWORD: masterise_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mh_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: mh_redis
    restart: unless-stopped
    ports:
      - '8749:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mh_network

  # PHP-FPM (Laravel)
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mh_php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - ./docker/scripts:/docker-scripts
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=masterise_homes
      - DB_USERNAME=masterise
      - DB_PASSWORD=masterise_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: ["sh", "/docker-scripts/init-backend.sh"]
    networks:
      - mh_network

  # Nginx (serves Laravel API)
  nginx:
    image: nginx:1.25-alpine
    container_name: mh_nginx
    restart: unless-stopped
    ports:
      - '8747:80'
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - mh_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:5
    container_name: mh_phpmyadmin
    restart: unless-stopped
    ports:
      - '8750:80'
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mh_network

  # Next.js Frontend (Dev inside Docker)
  frontend:
    image: node:20-alpine
    container_name: mh_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - '8746:8746'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - PORT=8746
      - NEXT_PUBLIC_API_URL=http://localhost:8747/api/v1
    command: sh -c "npm install && npm run dev"
    depends_on:
      - nginx
    networks:
      - mh_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  mh_network:
    driver: bridge
