version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mh_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mh_network

  redis:
    image: redis:7-alpine
    container_name: mh_redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mh_network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mh_php
    restart: always
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    networks:
      - mh_network

  nginx:
    image: nginx:1.25-alpine
    container_name: mh_nginx
    restart: always
    ports:
      - '${API_PORT:-8747}:80'
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage/app/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - mh_network

  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.masterise-homes.net.vn/api/v1
    container_name: mh_frontend
    restart: always
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    env_file:
      - .env.production
    networks:
      - mh_network

  # Queue worker
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mh_queue
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    networks:
      - mh_network

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mh_scheduler
    restart: always
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    networks:
      - mh_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_storage:
    driver: local

networks:
  mh_network:
    driver: bridge
